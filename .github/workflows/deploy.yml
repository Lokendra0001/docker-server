name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # <-- this line allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 4️⃣ Deploy via SSH
      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root # or your deploy user
          key: ${{ secrets.SSH_KEY }} # the full private key content
          port: 22
          debug: true
          script: |
            cd ~/docker-server

            echo "📥 Pull latest code"
            git pull origin main

            echo "🐳 Rebuild and restart containers"
            docker-compose down --remove-orphans
            docker-compose up -d --build

            echo "🧹 Clean unused images"
            docker image prune -af
      - name: Test SSH key
        run: |
          echo "$SSH_KEY" > testkey
          ls -l testkey
